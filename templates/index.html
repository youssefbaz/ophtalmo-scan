<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OphtalmoScan v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Tajawal:wght@300;400;500;700&family=Space+Mono&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #06111a;
  --bg2: #091520;
  --bg3: #0c1e2d;
  --card: #0f2336;
  --border: #153045;
  --teal: #0ea5a0;
  --teal2: #14c4be;
  --teal-dim: rgba(14,165,160,0.12);
  --amber: #f59e0b;
  --amber-dim: rgba(245,158,11,0.12);
  --red: #ef4444;
  --red-dim: rgba(239,68,68,0.12);
  --green: #22c55e;
  --green-dim: rgba(34,197,94,0.12);
  --blue: #3b82f6;
  --text: #dff0f5;
  --text2: #7fa8be;
  --text3: #3d6a82;
  --radius: 14px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  font-family: 'Tajawal', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow: hidden;
}

/* ── SCROLLBARS ── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* ── LAYOUT ── */
.app { display: flex; height: 100vh; }
.sidebar {
  width: 250px; min-width: 250px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  height: 100vh; overflow: hidden;
}
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar {
  height: 58px; min-height: 58px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  display: flex; align-items: center;
  padding: 0 24px; gap: 16px;
  flex-shrink: 0;
}
.content { flex: 1; overflow-y: auto; padding: 24px; }

/* ── LOGIN ── */
#loginScreen {
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at 30% 40%, #0a2535 0%, var(--bg) 70%);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000;
}

.login-box {
  width: 420px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 48px 40px;
  box-shadow: 0 32px 80px rgba(0,0,0,0.6);
}

.login-logo { text-align: center; margin-bottom: 36px; }
.login-logo-icon {
  width: 64px; height: 64px;
  background: linear-gradient(135deg, var(--teal), #0c7a76);
  border-radius: 20px;
  display: flex; align-items: center; justify-content: center;
  font-size: 32px; margin: 0 auto 16px;
  box-shadow: 0 8px 24px rgba(14,165,160,0.3);
}
.login-title { font-family: 'Playfair Display', serif; font-size: 26px; color: var(--text); }
.login-sub { font-size: 13px; color: var(--text2); margin-top: 4px; }

.role-tabs { display: flex; gap: 6px; margin-bottom: 24px; background: rgba(255,255,255,0.04); padding: 4px; border-radius: 12px; }
.role-tab {
  flex: 1; padding: 8px; border-radius: 9px; border: none;
  background: transparent; color: var(--text2);
  font-family: 'Tajawal', sans-serif; font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all 0.15s; text-align: center;
}
.role-tab.active { background: var(--teal); color: white; }
.role-tab .role-emoji { display: block; font-size: 18px; margin-bottom: 2px; }

.form-group { margin-bottom: 16px; }
.form-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: 0.5px; }
.form-input {
  width: 100%; padding: 11px 14px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 10px; color: var(--text);
  font-family: 'Tajawal', sans-serif; font-size: 14px;
  outline: none; transition: border-color 0.15s;
}
.form-input:focus { border-color: var(--teal); }
.form-input::placeholder { color: var(--text3); }

.demo-creds {
  background: var(--teal-dim);
  border: 1px solid rgba(14,165,160,0.2);
  border-radius: 10px; padding: 10px 14px; margin-bottom: 20px;
  font-size: 12px; color: var(--text2); line-height: 1.8;
}
.demo-creds strong { color: var(--teal2); }

/* ── SIDEBAR ELEMENTS ── */
.sidebar-logo {
  padding: 20px 18px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sidebar-logo-name { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--teal2); }
.sidebar-logo-role {
  font-size: 11px; color: var(--text3);
  font-family: 'Space Mono', monospace;
  text-transform: uppercase; letter-spacing: 1px; margin-top: 2px;
}

.nav-section { padding: 12px 10px 4px; flex-shrink: 0; }
.nav-section-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text3); padding: 0 10px; margin-bottom: 4px; }

.nav-btn {
  width: 100%; display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; border-radius: 10px; border: none;
  background: transparent; color: var(--text2);
  font-family: 'Tajawal', sans-serif; font-size: 14px; font-weight: 500;
  cursor: pointer; transition: all 0.15s; text-align: left; margin-bottom: 2px;
  position: relative;
}
.nav-btn:hover { background: var(--teal-dim); color: var(--text); }
.nav-btn.active { background: var(--teal-dim); color: var(--teal2); border-left: 2px solid var(--teal); padding-left: 10px; }
.nav-btn .nb { font-size: 11px; padding: 1px 7px; border-radius: 20px; background: var(--red); color: white; margin-left: auto; }
.nav-btn .nb.amber { background: var(--amber); }

.sidebar-patient-section { flex: 1; overflow: hidden; display: flex; flex-direction: column; min-height: 0; }
.sidebar-patient-search { padding: 10px 10px 6px; flex-shrink: 0; }
.sidebar-patient-search input {
  width: 100%; padding: 7px 12px;
  background: rgba(255,255,255,0.04); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text);
  font-family: 'Tajawal', sans-serif; font-size: 13px; outline: none;
}
.sidebar-patient-search input:focus { border-color: var(--teal); }
.sidebar-patient-search input::placeholder { color: var(--text3); }

.patient-list-scroll { flex: 1; overflow-y: auto; padding: 0 10px 12px; }

.patient-mini {
  padding: 9px 10px; border-radius: 10px; cursor: pointer;
  transition: all 0.15s; border: 1px solid transparent; margin-bottom: 3px;
}
.patient-mini:hover { background: var(--teal-dim); border-color: var(--border); }
.patient-mini.active { background: var(--teal-dim); border-color: var(--teal); }
.patient-mini .pm-name { font-size: 13px; font-weight: 600; color: var(--text); }
.patient-mini .pm-id { font-size: 11px; color: var(--text3); font-family: 'Space Mono', monospace; }
.patient-mini .pm-badge { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 4px; background: var(--red-dim); color: #fca5a5; margin-top: 3px; }

/* ── TOPBAR ── */
.topbar-title { font-family: 'Playfair Display', serif; font-size: 18px; flex: 1; }
.global-search-wrap { position:relative; }
.global-search-input { background:var(--bg3); border:1px solid var(--border); border-radius:20px; padding:6px 14px 6px 34px; font-size:13px; color:var(--text); width:220px; outline:none; transition:border-color .2s,width .2s; }
.global-search-input:focus { border-color:var(--teal); width:280px; }
.global-search-input::placeholder { color:var(--text3); }
.global-search-icon { position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--text3); pointer-events:none; }
.global-search-dropdown { display:none; position:absolute; top:calc(100% + 6px); left:0; right:0; background:var(--bg3); border:1px solid var(--border); border-radius:12px; box-shadow:var(--shadow); z-index:300; max-height:340px; overflow-y:auto; min-width:320px; }
.global-search-dropdown.open { display:block; }
.gsd-item { padding:10px 14px; cursor:pointer; border-bottom:1px solid var(--border); transition:background .15s; display:flex;align-items:center;gap:10px; }
.gsd-item:last-child { border-bottom:none; }
.gsd-item:hover { background:var(--teal-dim); }
.gsd-icon { font-size:16px; flex-shrink:0; }
.gsd-label { font-size:13px; color:var(--text); font-weight:500; }
.gsd-sub { font-size:11px; color:var(--text3); }
.topbar-user {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 14px; border-radius: 10px;
  background: rgba(255,255,255,0.04); border: 1px solid var(--border);
  cursor: pointer;
}
.topbar-user-name { font-size: 13px; font-weight: 600; }
.topbar-user-role { font-size: 11px; color: var(--text2); }
.role-dot { width: 8px; height: 8px; border-radius: 50%; }
.role-dot.medecin { background: var(--teal2); }
.role-dot.patient { background: var(--blue); }

.notif-btn {
  position: relative; width: 38px; height: 38px;
  border-radius: 10px; border: 1px solid var(--border);
  background: transparent; color: var(--text2); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.notif-btn:hover { background: var(--teal-dim); color: var(--teal2); }
.notif-count {
  position: absolute; top: -4px; right: -4px;
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--red); font-size: 9px; color: white;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700;
}

/* ── VIEWS ── */
.view { display: none; }
.view.active { display: block; }

/* ── CARDS & GRIDS ── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
.grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
.grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; }

.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px;
}
.card-sm { padding: 14px 16px; }

.stat-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px 20px;
  position: relative; overflow: hidden;
}
.stat-card::after {
  content: ''; position: absolute;
  top: 0; left: 0; right: 0; height: 3px;
}
.stat-card.teal::after { background: var(--teal); }
.stat-card.amber::after { background: var(--amber); }
.stat-card.red::after { background: var(--red); }
.stat-card.blue::after { background: var(--blue); }
.stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text2); }
.stat-value { font-family: 'Playfair Display', serif; font-size: 32px; color: var(--text); margin: 4px 0 0; }
.stat-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }

.section-title {
  font-family: 'Playfair Display', serif; font-size: 17px; color: var(--text);
  margin-bottom: 14px; display: flex; align-items: center; gap: 10px;
}
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ── PATIENT HEADER ── */
.patient-header {
  background: linear-gradient(135deg, #102840 0%, var(--bg2) 100%);
  border: 1px solid var(--border); border-radius: 18px;
  padding: 22px 24px; margin-bottom: 20px;
  display: flex; align-items: flex-start; gap: 20px;
}
.patient-avatar {
  width: 56px; height: 56px; border-radius: 16px;
  background: linear-gradient(135deg, #0c7a76, var(--teal2));
  display: flex; align-items: center; justify-content: center;
  font-family: 'Playfair Display', serif; font-size: 20px; color: white;
  flex-shrink: 0;
}
.patient-fullname { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--text); }
.patient-meta { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 6px; }
.patient-meta-item { font-size: 12px; color: var(--text2); display: flex; align-items: center; gap: 4px; }
.badges { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }

/* ── BADGES ── */
.badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.badge-teal { background: var(--teal-dim); color: var(--teal2); border: 1px solid rgba(14,165,160,0.25); }
.badge-red { background: var(--red-dim); color: #fca5a5; border: 1px solid rgba(239,68,68,0.25); }
.badge-amber { background: var(--amber-dim); color: #fcd34d; border: 1px solid rgba(245,158,11,0.25); }
.badge-blue { background: rgba(59,130,246,0.1); color: #93c5fd; border: 1px solid rgba(59,130,246,0.25); }
.badge-green { background: var(--green-dim); color: #86efac; border: 1px solid rgba(34,197,94,0.25); }

/* ── TABS ── */
.tabs { display: flex; gap: 3px; margin-bottom: 18px; background: rgba(255,255,255,0.03); padding: 3px; border-radius: 12px; width: fit-content; border: 1px solid var(--border); }
.tab-btn { padding: 7px 16px; border-radius: 10px; border: none; background: transparent; color: var(--text2); font-family: 'Tajawal', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
.tab-btn:hover { color: var(--text); }
.tab-btn.active { background: var(--teal); color: white; }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* ── TIMELINE ── */
.timeline { position: relative; padding-left: 26px; }
.timeline::before { content: ''; position: absolute; left: 6px; top: 0; bottom: 0; width: 2px; background: var(--border); }
.tl-item { position: relative; margin-bottom: 16px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; transition: border-color 0.15s; }
.tl-item:hover { border-color: var(--teal); }
.tl-item::before { content: ''; position: absolute; left: -21px; top: 18px; width: 9px; height: 9px; border-radius: 50%; background: var(--teal); border: 2px solid var(--bg); }
.tl-date { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--teal2); margin-bottom: 5px; }
.tl-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
.tl-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
.tl-field { background: rgba(255,255,255,0.03); border-radius: 8px; padding: 7px 10px; }
.tl-field-label { font-size: 10px; text-transform: uppercase; color: var(--text3); }
.tl-field-value { font-size: 12px; color: var(--text2); margin-top: 2px; }
.tl-note { margin-top: 8px; font-size: 12px; color: var(--text2); background: rgba(255,255,255,0.03); border-radius: 8px; padding: 7px 10px; border-left: 3px solid var(--teal); }

/* ── POST-OP TIMELINE ── */
.postop-track { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 24px; }
.jalon {
  display: flex; flex-direction: column; align-items: center;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 12px 16px; min-width: 72px;
  transition: all 0.15s; cursor: default;
}
.jalon.done { border-color: var(--teal); background: var(--teal-dim); }
.jalon.overdue { border-color: var(--amber); background: var(--amber-dim); }
.jalon.upcoming { border-color: var(--border); opacity: 0.6; }
.jalon-day { font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; color: var(--teal2); }
.jalon.overdue .jalon-day { color: #fcd34d; }
.jalon.upcoming .jalon-day { color: var(--text3); }
.jalon-status { font-size: 18px; margin: 4px 0; }
.jalon-label { font-size: 10px; color: var(--text3); text-align: center; }
.jalon.done .jalon-label { color: var(--teal2); }

/* ── EXPORT BUTTON ── */
.btn-export { background: rgba(59,130,246,0.15); border: 1px solid rgba(59,130,246,0.3); color: #93c5fd; }
.btn-export:hover { background: rgba(59,130,246,0.25); }

/* ── RDV ── */
.rdv-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 18px;
  display: flex; align-items: center; gap: 16px;
  transition: border-color 0.15s; margin-bottom: 10px;
}
.rdv-card:hover { border-color: var(--teal); }
.rdv-card.urgent { border-color: rgba(239,68,68,0.4); background: rgba(239,68,68,0.04); }
.rdv-date-block { text-align: center; min-width: 50px; background: var(--teal-dim); border-radius: 10px; padding: 7px; border: 1px solid rgba(14,165,160,0.2); }
.rdv-date-block.urgent { background: var(--red-dim); border-color: rgba(239,68,68,0.3); }
.rdv-day { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--teal2); line-height: 1; }
.rdv-day.urgent { color: #fca5a5; }
.rdv-month { font-size: 10px; text-transform: uppercase; color: var(--text2); letter-spacing: 1px; }
.rdv-info { flex: 1; }
.rdv-type { font-size: 14px; font-weight: 600; color: var(--text); }
.rdv-meta { font-size: 12px; color: var(--text2); margin-top: 3px; }

/* ── BUTTONS ── */
.btn { padding: 9px 18px; border-radius: 10px; border: none; font-family: 'Tajawal', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 7px; }
.btn-primary { background: var(--teal); color: white; }
.btn-primary:hover { background: var(--teal2); }
.btn-amber { background: var(--amber); color: #1a0f00; }
.btn-amber:hover { opacity: 0.85; }
.btn-red { background: var(--red); color: white; }
.btn-red:hover { opacity: 0.85; }
.btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text2); }
.btn-ghost:hover { border-color: var(--teal); color: var(--text); }
.btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 8px; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── FORMS ── */
.input {
  width: 100%; padding: 9px 13px;
  background: rgba(255,255,255,0.04); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text);
  font-family: 'Tajawal', sans-serif; font-size: 13px; outline: none;
  transition: border-color 0.15s;
}
.input:focus { border-color: var(--teal); }
.input::placeholder { color: var(--text3); }
select.input { cursor: pointer; }
textarea.input { resize: vertical; min-height: 80px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.form-full { margin-bottom: 12px; }
label.lbl { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text2); display: block; margin-bottom: 5px; }

/* ── AI CHAT ── */
.ai-panel { display: flex; flex-direction: column; height: calc(100vh - 106px); }
.ai-header { padding: 16px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; background: linear-gradient(135deg, rgba(14,165,160,0.1) 0%, transparent 100%); border-radius: 14px 14px 0 0; flex-shrink: 0; }
.ai-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--teal2); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
.ai-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.msg { max-width: 80%; animation: fadeIn 0.25s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
.msg-user { align-self: flex-end; }
.msg-ai { align-self: flex-start; }
.msg-bubble { padding: 11px 15px; border-radius: 13px; font-size: 13px; line-height: 1.65; white-space: pre-wrap; }
.msg-user .msg-bubble { background: var(--teal); color: white; border-radius: 13px 13px 4px 13px; }
.msg-ai .msg-bubble { background: rgba(255,255,255,0.04); color: var(--text); border: 1px solid var(--border); border-radius: 13px 13px 13px 4px; }
.msg-sender { font-size: 10px; color: var(--text3); margin-bottom: 3px; font-family: 'Space Mono', monospace; }
.msg-user .msg-sender { text-align: right; }
.ai-input-area { padding: 12px; border-top: 1px solid var(--border); display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0; }
.ai-input-area textarea { flex: 1; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 10px; padding: 9px 13px; color: var(--text); font-family: 'Tajawal', sans-serif; font-size: 13px; resize: none; outline: none; min-height: 40px; max-height: 100px; }
.ai-input-area textarea:focus { border-color: var(--teal); }
.send-btn { width: 40px; height: 40px; border-radius: 10px; border: none; background: var(--teal); color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0; }
.send-btn:hover { background: var(--teal2); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.quick-qs { padding: 0 12px 8px; display: flex; flex-wrap: wrap; gap: 5px; }
.quick-q { padding: 4px 11px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--text2); font-size: 11px; cursor: pointer; transition: all 0.15s; font-family: 'Tajawal', sans-serif; }
.quick-q:hover { border-color: var(--teal); color: var(--teal2); }

/* ── QUESTION CARDS ── */
.question-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }

.ai-draft-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--teal2); margin-bottom: 6px; display: flex; align-items: center; gap: 5px; }

/* ── IMPORT ── */
.import-zone {

}
.import-zone:hover { border-color: var(--teal); background: var(--teal-dim); }
.import-zone.drag { border-color: var(--teal); background: var(--teal-dim); }
.import-icon { font-size: 36px; margin-bottom: 10px; }
.import-text { font-size: 14px; color: var(--text2); }
.import-sub { font-size: 12px; color: var(--text3); margin-top: 4px; }

/* ── DOCUMENT CARDS ── */
.doc-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; cursor: pointer; transition: all 0.2s; }
.doc-card:hover { border-color: var(--teal); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }

.doc-preview img { width: 100%; height: 100%; object-fit: cover; }
.doc-info { padding: 12px; }
.doc-type { font-size: 13px; font-weight: 600; color: var(--teal2); }
.doc-date { font-size: 11px; color: var(--text3); font-family: 'Space Mono', monospace; margin-top: 2px; }

/* ── MODAL ── */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(6px); z-index: 500; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--bg3); border: 1px solid var(--border); border-radius: 20px; padding: 28px; width: 90vw; max-width: 680px; max-height: 90vh; overflow-y: auto; }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.modal-title { font-family: 'Playfair Display', serif; font-size: 19px; }
.modal-close { width: 30px; height: 30px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text); cursor: pointer; font-size: 17px; }

/* ── NOTIF PANEL ── */
.notif-panel { display: none; position: fixed; top: 66px; right: 16px; width: 340px; background: var(--bg3); border: 1px solid var(--border); border-radius: 16px; z-index: 200; box-shadow: var(--shadow); max-height: 480px; overflow-y: auto; }

.notif-item { padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; }

.notif-item.unread { border-left: 3px solid var(--teal); }

.notif-time { font-size: 11px; color: var(--text3); font-family: 'Space Mono', monospace; margin-top: 3px; }

/* ── LOADING ── */
.loading-dots span { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: var(--teal2); margin: 0 2px; animation: bounce 1.2s infinite; }
.loading-dots span:nth-child(2) { animation-delay: 0.2s; }

/* ── PATIENT ROLE SPECIFIC ── */

.welcome-avatar { width: 52px; height: 52px; border-radius: 14px; background: linear-gradient(135deg, var(--blue), #1d4ed8); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }

/* ── EXAM TABLE ── */

.ph-id-info { flex: 1; min-width: 0; }
.ph-meta-row { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 7px; }

.ph-contact-item { font-size: 12px; color: var(--text2); display: flex; align-items: center; gap: 4px; }

/* ── CLINICAL SNAPSHOT ── */
.ph-snapshot {
  min-width: 255px; background: rgba(255,255,255,0.02);

}

.ph-snap-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 8px; border-top: 1px solid var(--border); gap: 8px; }

/* ── PATIENT ACTIONS ── */
.ph-actions { display: flex; flex-direction: column; gap: 6px; min-width: 148px; flex-shrink: 0; }

/* ── TAB COUNT BADGE ── */
.tab-count { display: inline-flex; align-items: center; justify-content: center; font-size: 10px; padding: 1px 6px; border-radius: 10px; background: rgba(255,255,255,0.1); color: var(--text2); margin-left: 4px; }

/* ── POST-OP BANNER ── */
.postop-banner {

<script>
// ─── STATE ────────────────────────────────────────────────────────────────────
let USER = null;
let MEDECINS = [];
let currentPatientId = null;
let currentView = null;
let aiContext = '';
let notifOpen = false;

// ─── AUTH ─────────────────────────────────────────────────────────────────────
const DEMO = {
  medecin: {user:'dr.martin', pass:'medecin123', hint:'🩺 Médecin: dr.martin / medecin123'},
  patient: {user:'patient.marie', pass:'patient123', hint:'🧑 Patient 1: patient.marie / patient123<br>🧑 Patient 2: patient.jp / patient123'}
};

function setLoginRole(role, btn) {
  document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('demoCreds').innerHTML = DEMO[role].hint;
  document.getElementById('loginUser').value = DEMO[role].user;
  document.getElementById('loginPass').value = DEMO[role].pass;
}

async function doLogin() {
  const u = document.getElementById('loginUser').value;
  const p = document.getElementById('loginPass').value;
  const res = await api('/login','POST',{username:u,password:p});
  if (res.ok) {
    const me = await api('/me');
    USER = {...res, ...me};
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = 'flex';
    initApp();
  } else {
    document.getElementById('loginError').textContent = res.error || 'Erreur';
    document.getElementById('loginError').style.display = 'block';
  }
}

async function doLogout() {
  await api('/logout','POST');
  USER = null; currentPatientId = null;
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('mainApp').style.display = 'none';
}

// ─── APP INIT ─────────────────────────────────────────────────────────────────
function initApp() {
  const roleLabels = {medecin:'Médecin Ophtalmologiste',assistant:'Secrétaire Médicale',patient:'Espace Patient'};
  document.getElementById('topbarUser').textContent = USER.prenom + ' ' + USER.nom;
  document.getElementById('topbarRole').textContent = roleLabels[USER.role];
  document.getElementById('roleDot').className = 'role-dot ' + USER.role;
  document.getElementById('sidebarRole').textContent = roleLabels[USER.role];
  
  buildSidebar();
  loadNotifications();
  if (USER.role === 'medecin') {
    api('/api/medecins').then(list => { MEDECINS = list || []; });
    document.getElementById('globalSearchWrap').style.display = 'block';
  }

  if (USER.role === 'medecin') showView('dashboard-medecin');
  else { showView('dashboard-patient'); }
  
  setInterval(loadNotifications, 30000);
}

function buildSidebar() {
  let html = '';
  if (USER.role === 'medecin') {
    html = `
      <div class="nav-section">
        <div class="nav-section-label">Navigation</div>
        <button class="nav-btn" onclick="showView('dashboard-medecin')">📊 Tableau de bord</button>
        <button class="nav-btn" onclick="showView('agenda')">📅 Agenda & RDV</button>
        <button class="nav-btn" onclick="showView('questions-medecin')">💬 Questions patients</button>
        <button class="nav-btn" onclick="showView('ai-assistant')">🤖 Assistant IA</button>
      </div>
      <div class="nav-section">
        <div class="nav-section-label" style="display:flex;align-items:center;justify-content:space-between;padding-right:10px">
          Patients
          <div style="display:flex;gap:4px">
            <button class="btn btn-sm btn-ghost" style="padding:3px 8px;font-size:11px" onclick="openAddPatient()">+ Ajouter</button>
            <button class="btn btn-sm btn-ghost" style="padding:3px 8px;font-size:11px" onclick="openImport()">↑ Importer</button>
          </div>
        </div>
      </div>
      <div class="sidebar-patient-section">
        <div class="sidebar-patient-search">
          <input type="text" placeholder="Rechercher un patient..." oninput="searchPatients(this.value)">
        </div>
        <div style="display:flex;gap:4px;padding:4px 8px 0">
          <button id="btnMesPatients" class="btn btn-sm btn-primary" style="flex:1;justify-content:center;font-size:11px" onclick="setSidebarFilter(false)">Mes patients</button>
          <button id="btnTousPatients" class="btn btn-sm btn-ghost" style="flex:1;justify-content:center;font-size:11px" onclick="setSidebarFilter(true)">Tous</button>
        </div>
        <div class="patient-list-scroll" id="patientListSidebar"></div>
      </div>`;
  } else {
    html = `
      <div class="nav-section">
        <div class="nav-section-label">Mon espace</div>
        <button class="nav-btn" onclick="showView('dashboard-patient')">🏠 Accueil</button>
        <button class="nav-btn" onclick="showView('mes-rdv')">📅 Mes rendez-vous</button>
        <button class="nav-btn" onclick="showView('mes-documents')">📎 Mes documents</button>
        <button class="nav-btn" onclick="showView('mes-questions')">💬 Questions au médecin</button>

// ─── VIEWS ROUTER ─────────────────────────────────────────────────────────────
function showView(viewId, title) {
  currentView = viewId;
  const titles = {
    'dashboard-medecin':'Tableau de bord',
    'dashboard-patient':'Mon espace santé','agenda':'Agenda & Rendez-vous',
    'questions-medecin':'Questions des patients','ai-assistant':'Assistant IA Ophtalmologie',
    'patient-profile':'Dossier patient','liste-patients-anon':'Liste des patients',
    'mes-rdv':'Mes rendez-vous','mes-documents':'Mes documents','mes-questions':'Questions au médecin'
  };
  document.getElementById('topbarTitle').textContent = title || titles[viewId] || viewId;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  
  // Render view
  const c = document.getElementById('mainContent');
  if (viewId === 'dashboard-medecin') renderDashboardMedecin(c);
  else if (viewId === 'dashboard-patient') renderDashboardPatient(c);
  else if (viewId === 'agenda') renderAgenda(c);
  else if (viewId === 'questions-medecin') renderQuestionsMedecin(c);
  else if (viewId === 'ai-assistant') renderAiAssistant(c);
  else if (viewId === 'patient-profile') renderPatientProfile(c, currentPatientId);
  else if (viewId === 'liste-patients-anon') renderListePatientsAnon(c);
  else if (viewId === 'mes-rdv') renderMesRdv(c);
  else if (viewId === 'mes-documents') renderMesDocuments(c);
  else if (viewId === 'mes-questions') renderMesQuestions(c);
}

            const isCurrent = r.heure <= now && now <= r.heure.replace(/(\d+):(\d+)/, (_, h, m) => `${String(+h + 1).padStart(2,'0')}:${m}`);

                ${h.refraction_od_axe ? `<tr><td>Axe (°)</td><td>${h.refraction_od_axe}</td><td>${h.refraction_og_axe||'—'}</td></tr>` : ''}

            <div id="rdv-detail-${r.id}" style="display:none;margin-top:8px;padding:10px;background:var(--bg2);border-radius:8px;font-size:12px;color:var(--text2)">

              ${r.urgent?`<div style="color:var(--red);margin-top:4px">⚠ RDV urgent</div>`:''}
              ${r.demande_par?`<div><strong>Demandé par :</strong> ${r.demande_par}</div>`:''}

          </div>
          <div style="display:flex;flex-direction:column;gap:5px;align-items:flex-end">
            <span class="badge ${r.statut==='confirmé'?'badge-teal':r.statut==='en_attente'?'badge-amber':'badge-red'}">${r.statut}</span>
            <button class="btn btn-ghost btn-sm" style="font-size:10px" onclick="toggleRdvDetail('${r.id}')">+ infos</button>
            ${r.statut==='en_attente'&&USER.role==='medecin'?`<button class="btn btn-primary btn-sm" onclick="validerRdv('${r.id}','confirmé')">Confirmer</button>`:''}
            ${USER.role==='medecin'?`<button class="btn btn-red btn-sm" onclick="deleteRdv('${r.id}')">🗑</button>`:''}
          </div>
        </div>`; }).join('') || '<div style="color:var(--text3);text-align:center;padding:40px">Aucun rendez-vous</div>'}
    </div>

    <!-- ── TAB: Questions ── -->
    <div class="tab-content" id="tab-qst">
      ${renderQuestionsPanel(questions, pid)}

  if (patient.historique.length >= 2) {
    setTimeout(() => renderEvolutionCharts(patient, pid), 50);
  }
}

function togglePostOp() {
  const section = document.getElementById('postop-section');
  const label   = document.getElementById('postopToggleLabel');
  if (!section) return;
  const open = section.style.display !== 'none';
  section.style.display = open ? 'none' : 'block';
  label.textContent = open ? 'Afficher le suivi ▼' : 'Masquer le suivi ▲';
}

function switchSubtab(targetId, btn) {
  const parent = btn.closest('.tab-content');
  parent.querySelectorAll('.subtab-btn').forEach(b => b.classList.remove('active'));
  parent.querySelectorAll('.subtab-content').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  const el = document.getElementById(targetId);
  if (el) el.classList.add('active');
}

function openUploadImagerie(pid) {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = async () => {
    const file = input.files[0]; if (!file) return;
    const type = prompt('Type d\'imagerie ?', 'OCT Macula');
    if (!type) return;
    const reader = new FileReader();
    reader.onload = async (e) => {
      const b64 = e.target.result.split(',')[1];
      const res = await api(`/api/patients/${pid}/upload`, 'POST', {image: b64, type, description: file.name, source: 'imagerie'});
      if (res.ok) loadPatient(pid);
      else alert(res.error || 'Erreur upload');
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

function renderDocsGrid(docs, pid) {
  if (!docs.length) return '<div style="color:var(--text3);text-align:center;padding:30px">Aucun document uploadé par le patient</div>';
  return `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px">
    ${docs.map(d=>`
      <div class="doc-card">
        <div class="doc-preview" style="cursor:pointer" onclick="viewDocImage('${pid}','${d.id}','${escJ(d.type)}')">
          <div style="font-size:40px;text-align:center">📎</div>
          <div style="font-size:11px;color:var(--teal2);text-align:center;margin-top:4px">Cliquer pour voir</div>
        </div>
        <div class="doc-info">
          <div class="doc-type">${d.type}</div>
          <div class="doc-date">${fmtDate(d.date)}</div>
          <div class="doc-uploader">Uploadé par: ${d.uploaded_by}</div>
          ${d.analyse_ia?`<div style="margin-top:6px;font-size:11px;color:var(--teal2)">✓ Analysé par IA</div>`:''}
          <div style="display:flex;gap:6px;margin-top:8px">
            <button class="btn btn-ghost btn-sm" style="flex:1;justify-content:center" onclick="viewDocImage('${pid}','${d.id}','${escJ(d.type)}')">👁 Voir</button>
            <button class="btn btn-primary btn-sm" style="flex:1;justify-content:center" onclick="analyzeDocAI('${pid}','${d.id}','${d.type}')">🤖 IA</button>
          </div>
        </div>
      </div>
    `).join('')}
  </div>`;
}

async function viewDocImage(pid, docId, type) {
  const doc = await api(`/api/patients/${pid}/documents/${docId}`);
  if (!doc || doc.error) { alert('Document introuvable'); return; }

  document.getElementById('modalImageTitle').textContent = type || 'Document patient';
  document.getElementById('modalImageContent').innerHTML = doc.image_b64 ? `
    <div style="text-align:center;padding:10px">
      <img src="data:image/jpeg;base64,${doc.image_b64}" style="max-width:100%;max-height:65vh;border-radius:10px;object-fit:contain">
      <div style="margin-top:12px;font-size:12px;color:var(--text3)">Uploadé le ${fmtDate(doc.date)} par ${doc.uploaded_by}</div>
      ${doc.analyse_ia ? `<div style="margin-top:10px;background:var(--teal-dim);border:1px solid rgba(14,165,160,0.2);border-radius:10px;padding:12px;text-align:left;font-size:13px;color:var(--text2)">${doc.analyse_ia}</div>` : ''}
    </div>` : `
    <div style="text-align:center;padding:40px;color:var(--text3)">
      <div style="font-size:40px;margin-bottom:12px">📎</div>
      <div>Aucune image disponible pour ce document</div>
    </div>`;
  openModal('modalImage');
}

function renderQuestionsPanel(questions, pid) {
  if (!questions.length) return '<div style="color:var(--text3);text-align:center;padding:30px">Aucune question</div>';
  return questions.map(q=>`
    <div class="question-card ${q.statut==='en_attente'?'pending':'answered'}" id="qcard-${q.id}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div class="q-text">❓ ${q.question}</div>
        <span class="badge ${q.statut==='en_attente'?'badge-amber':'badge-green'}">${q.statut}</span>

      <div class="q-date">${q.date}</div>

          <div class="ai-draft-label">🤖 Réponse suggérée par l'IA</div>
          <div class="ai-draft-text">${q.reponse_ia}</div>
        </div>` : ''}
      ${q.statut==='en_attente'?`
        <div class="answer-area">

          <textarea class="input" id="rep-${q.id}" rows="3">${q.reponse_ia||''}</textarea>
          <div style="margin-top:8px;display:flex;gap:8px">

// ─── AGENDA ───────────────────────────────────────────────────────────────────
// ─── AGENDA / CALENDRIER ──────────────────────────────────────────────────────
let _calYear, _calMonth, _allRdvs = [];

async function renderAgenda(c) {
  _allRdvs = await api('/api/rdv');
  const now = new Date();
  _calYear  = now.getFullYear();
  _calMonth = now.getMonth();
  _renderCalendar(c);
}

function _renderCalendar(c) {
  const today   = new Date().toISOString().slice(0,10);
  const months  = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const days    = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];

  // Build day map for current month
  const rdvMap  = {};
  _allRdvs.forEach(r => { if (!rdvMap[r.date]) rdvMap[r.date] = []; rdvMap[r.date].push(r); });

  // Stats for header
  const confirmed = _allRdvs.filter(r => r.statut === 'confirmé').length;
  const pending   = _allRdvs.filter(r => r.statut === 'en_attente').length;
  const urgent    = _allRdvs.filter(r => r.urgent).length;

  // Calendar grid
  const firstDay = new Date(_calYear, _calMonth, 1);
  const lastDay  = new Date(_calYear, _calMonth + 1, 0);
  // Monday-based: 0=Mon … 6=Sun
  let startDow = firstDay.getDay(); // 0=Sun
  startDow = (startDow === 0) ? 6 : startDow - 1;

  let cells = '';
  // Empty cells before first day
  for (let i = 0; i < startDow; i++) cells += `<div class="cal-cell cal-empty"></div>`;

  for (let d = 1; d <= lastDay.getDate(); d++) {
    const dateStr = `${_calYear}-${String(_calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayRdvs = rdvMap[dateStr] || [];
    const isToday = dateStr === today;
    const hasUrgent = dayRdvs.some(r => r.urgent);
    const dots = dayRdvs.slice(0,4).map(r => {
      const col = r.urgent ? 'var(--red)' : r.statut==='confirmé' ? 'var(--teal)' : 'var(--amber)';
      return `<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${col}"></span>`;
    }).join('');
    cells += `
      <div class="cal-cell ${isToday?'cal-today':''} ${dayRdvs.length?'cal-has-rdv':''} ${hasUrgent?'cal-urgent':''}"
           onclick="calSelectDay('${dateStr}')">
        <div class="cal-day-num">${d}</div>
        ${dayRdvs.length ? `<div style="display:flex;gap:2px;flex-wrap:wrap;margin-top:2px">${dots}</div>` : ''}
        ${dayRdvs.length ? `<div style="font-size:9px;color:var(--text3);margin-top:1px">${dayRdvs.length} rdv</div>` : ''}
      </div>`;
  }

  // Upcoming list (next 7 days)
  const upcoming = _allRdvs
    .filter(r => r.date >= today && r.statut !== 'annulé')
    .sort((a,b) => (a.date+a.heure).localeCompare(b.date+b.heure))
    .slice(0, 8);

  c.innerHTML = `
    <style>
      .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
      .cal-header-day { text-align:center; font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--text3); padding:6px 0; }
      .cal-cell { min-height:64px; border-radius:8px; padding:6px; background:var(--card); border:1px solid var(--border); cursor:pointer; transition:border-color .15s; }
      .cal-cell:hover { border-color:var(--teal); }
      .cal-cell.cal-empty { background:transparent; border:none; cursor:default; }
      .cal-cell.cal-today { border-color:var(--teal); background:var(--teal-dim); }
      .cal-cell.cal-has-rdv { }
      .cal-cell.cal-urgent { border-color:rgba(239,68,68,.5); }
      .cal-cell.cal-selected { border-color:var(--teal); box-shadow:0 0 0 2px rgba(14,165,160,.3); }
      .cal-day-num { font-size:12px; font-weight:600; color:var(--text2); }
      .cal-cell.cal-today .cal-day-num { color:var(--teal2); }
      .cal-day-panel { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:16px; }
    </style>

    <!-- Header stats -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <span class="badge badge-teal">✓ ${confirmed} confirmé(s)</span>
        <span class="badge badge-amber">⏳ ${pending} en attente</span>
        ${urgent ? `<span class="badge badge-red">🚨 ${urgent} urgent(s)</span>` : ''}
      </div>
      ${USER.role==='medecin'?`<button class="btn btn-primary btn-sm" onclick="openAddRdv(null)">+ Nouveau RDV</button>`:''}
    </div>

    <div style="display:grid;grid-template-columns:1fr 300px;gap:20px;align-items:start">
      <!-- Calendar -->
      <div>
        <!-- Month nav -->
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
          <button class="btn btn-ghost btn-sm" onclick="calNav(-1)">‹ Précédent</button>
          <div style="font-size:15px;font-weight:700;color:var(--text)">${months[_calMonth]} ${_calYear}</div>
          <button class="btn btn-ghost btn-sm" onclick="calNav(1)">Suivant ›</button>
        </div>
        <!-- Day headers -->
        <div class="cal-grid" style="margin-bottom:4px">
          ${days.map(d=>`<div class="cal-header-day">${d}</div>`).join('')}
        </div>
        <!-- Day cells -->
        <div class="cal-grid">${cells}</div>
      </div>

      <!-- Side panel -->
      <div>
        <div id="calDayPanel" class="cal-day-panel">
          <div style="font-size:12px;font-weight:600;color:var(--teal2);margin-bottom:12px">PROCHAINS RDV</div>
          ${upcoming.length ? upcoming.map(r => _rdvMiniCard(r)).join('') :
            '<div style="color:var(--text3);font-size:13px">Aucun RDV à venir</div>'}
        </div>
      </div>
    </div>`;
}

function _rdvMiniCard(r) {
  const col = r.urgent ? 'var(--red)' : r.statut==='confirmé' ? 'var(--teal)' : 'var(--amber)';
  return `
    <div style="padding:10px;border-radius:8px;background:var(--bg2);border:1px solid var(--border);margin-bottom:8px;${USER.role==='medecin'?'cursor:pointer':''};"
         ${USER.role==='medecin'?`onclick="loadPatient('${r.patient_id}')"`:''}>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
        <span style="width:8px;height:8px;border-radius:50%;background:${col};flex-shrink:0"></span>
        <span style="font-size:12px;font-weight:600;color:var(--text)">${r.heure} · ${r.type}</span>
      </div>
      <div style="font-size:11px;color:var(--text2);margin-left:16px">${r.patient_prenom||''} ${r.patient_nom||''}</div>
      <div style="font-size:11px;color:var(--text3);margin-left:16px">${fmtDate(r.date)} · <span style="color:${col}">${r.statut}</span></div>
      ${r.statut==='en_attente'&&USER.role==='medecin'?`
        <div style="display:flex;gap:6px;margin-top:6px;margin-left:16px">
          <button class="btn btn-primary btn-sm" style="font-size:10px" onclick="event.stopPropagation();validerRdv('${r.id}','confirmé')">✓ Confirmer</button>
          <button class="btn btn-ghost btn-sm" style="font-size:10px" onclick="event.stopPropagation();validerRdv('${r.id}','annulé')">✗ Annuler</button>
        </div>`:''}
    </div>`;
}

function calNav(dir) {
  _calMonth += dir;
  if (_calMonth > 11) { _calMonth = 0; _calYear++; }
  if (_calMonth < 0)  { _calMonth = 11; _calYear--; }
  _renderCalendar(document.getElementById('mainContent'));
}

function calSelectDay(dateStr) {
  // Highlight selected cell
  document.querySelectorAll('.cal-cell').forEach(el => el.classList.remove('cal-selected'));
  event.currentTarget.classList.add('cal-selected');

  const panel = document.getElementById('calDayPanel');
  const dayRdvs = _allRdvs.filter(r => r.date === dateStr).sort((a,b) => a.heure.localeCompare(b.heure));
  panel.innerHTML = `

async function renderQuestionsMedecin(c) {
  const questions_all = [];

  const patientsMap = Object.fromEntries(patients.map(p => [p.id, p]));

  for (const pid of Object.keys(patientsMap)) {
    const qs = await api(`/api/patients/${pid}/questions`);

    const p = patientsMap[pid];
    qs.forEach(q => questions_all.push({...q, patient_id: pid, patient_nom: `${p.prenom} ${p.nom}`}));
  }
  const pending = questions_all.filter(q => q.statut === 'en_attente');

  c.innerHTML = `

      <span class="badge badge-amber">${pending.length} en attente</span>
      <span class="badge badge-green" style="margin-left:6px">${questions_all.length - pending.length} répondues</span>
    </div>
    ${questions_all.length === 0 ? '<div style="color:var(--text3);text-align:center;padding:40px">Aucune question</div>' :
      questions_all.sort((a,b)=>a.statut==='en_attente'?-1:1).map(q=>`
        <div class="question-card ${q.statut==='en_attente'?'pending':'answered'}">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">

            <span class="badge ${q.statut==='en_attente'?'badge-amber':'badge-green'}">${q.statut}</span>
          </div>
          <div class="q-text">❓ ${q.question}</div>
          <div class="q-date">${q.date}</div>
          ${q.reponse_ia?`<div class="ai-draft"><div class="ai-draft-label">🤖 Suggestion IA</div><div class="ai-draft-text">${q.reponse_ia}</div></div>`:''}

// ─── AI FUNCTIONS ─────────────────────────────────────────────────────────────
function sendQuickQ(q) { document.getElementById('aiInput').value=q; sendAiMsg(); }

async function sendAiMsg() {
  const inp = document.getElementById('aiInput');
  const q = inp.value.trim(); if(!q) return;
  inp.value=''; inp.style.height='auto';
  addMsg('user',q);
  const btn = document.getElementById('sendAiBtn'); btn.disabled=true;
  const lid='l'+Date.now();
  document.getElementById('aiMessages').innerHTML+=`<div class="msg msg-ai" id="${lid}"><div class="msg-sender">🤖</div><div class="msg-bubble"><span class="loading-dots"><span></span><span></span><span></span></span></div></div>`;
  scrollAi();
  const res = await api('/api/ai/question','POST',{question:q,context:aiContext});
  document.getElementById(lid)?.remove();
  addMsg('ai', res.answer||res.error||'Erreur');
  btn.disabled=false;
}

function addMsg(role,text) {
  const d=document.getElementById('aiMessages');
  d.innerHTML+=`<div class="msg msg-${role==='user'?'user':'ai'}"><div class="msg-sender">${role==='user'?'👨‍⚕️ MÉDECIN':'🤖 IA OPHTHALMO'}</div><div class="msg-bubble">${escH(text)}</div></div>`;
  scrollAi();
}
function scrollAi(){const d=document.getElementById('aiMessages');if(d)d.scrollTop=d.scrollHeight;}

async function startAiContext(pid) {
  const p = await api(`/api/patients/${pid}`);
  aiContext = `Patient: ${p.prenom} ${p.nom}, ${new Date().getFullYear()-new Date(p.ddn).getFullYear()} ans. Antécédents: ${p.antecedents.join(', ')}. Dernier traitement: ${p.historique[0]?.traitement||'NC'}`;
  showView('ai-assistant');
  setTimeout(()=>addMsg('ai',`Contexte chargé pour ${p.prenom} ${p.nom}.\nAntécédents: ${p.antecedents.join(', ')}\nDernier traitement: ${p.historique[0]?.traitement||'NC'}\n\nQuelle est votre question ?`),100);
}

// ─── POST-OP TIMELINE ─────────────────────────────────────────────────────────
function renderPostOpTimeline(patient) {
  const JALONS = [7, 14, 21, 30, 60, 90, 120, 180, 247];
  const dateChir = new Date(patient.date_chirurgie);
  const today = new Date();
  const histoDates = (patient.historique || []).map(h => h.date);

  const jalonsHtml = JALONS.map(j => {
    const jalDate = new Date(dateChir);
    jalDate.setDate(jalDate.getDate() + j);
    const jalStr = jalDate.toISOString().slice(0,10);
    const daysDiff = Math.round((jalDate - today) / 86400000);

    // Check if consultation exists around this date ±5 days
    const done = histoDates.some(d => Math.abs(new Date(d) - jalDate) <= 5 * 86400000);
    const overdue = !done && daysDiff < 0;
    const cls = done ? 'done' : overdue ? 'overdue' : 'upcoming';
    const icon = done ? '✅' : overdue ? '⚠️' : '🔜';

    return `
      <div class="jalon ${cls}" title="${jalStr}">
        <div class="jalon-day">J${j}</div>
        <div class="jalon-status">${icon}</div>
        <div class="jalon-label">${jalDate.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}</div>
        ${overdue ? `<div style="font-size:9px;color:#fcd34d;margin-top:2px">${Math.abs(daysDiff)}j de retard</div>` : ''}
        ${!done && daysDiff >= 0 ? `<div style="font-size:9px;color:var(--text3);margin-top:2px">dans ${daysDiff}j</div>` : ''}
      </div>`;
  }).join('');

  // Post-op consultations from historique
  const postOpConsults = (patient.historique || []).filter(h => h.date >= patient.date_chirurgie);

  return `
    <div style="margin-bottom:20px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <div>
          <div style="font-size:13px;color:var(--text2)">Chirurgie : <strong style="color:var(--teal2)">${patient.type_chirurgie || 'Intervention ophtalmologique'}</strong></div>
          <div style="font-size:12px;color:var(--text3);margin-top:2px">Date : ${fmtDate(patient.date_chirurgie)}</div>
        </div>
        <div style="font-family:'Space Mono',monospace;font-size:12px;color:var(--teal2)">
          J+${Math.round((today - new Date(patient.date_chirurgie)) / 86400000)} aujourd'hui
        </div>
      </div>
      <div class="postop-track">${jalonsHtml}</div>
      <div style="display:flex;gap:16px;font-size:11px;color:var(--text3);margin-bottom:20px">
        <span>✅ Consultation effectuée</span>
        <span>⚠️ En retard</span>
        <span>🔜 À venir</span>
      </div>
    </div>
    <div class="section-title">Consultations post-opératoires</div>
    ${postOpConsults.length ? `
      <div class="timeline">
        ${postOpConsults.map(h => {
          const jx = Math.round((new Date(h.date) - new Date(patient.date_chirurgie)) / 86400000);
          return `
          <div class="tl-item">
            <div class="tl-date">${fmtDateLong(h.date)} — <span style="color:var(--amber)">J+${jx}</span> — ${h.medecin}</div>
            <div class="tl-title">${h.motif}</div>
            <div class="tl-grid">
              <div class="tl-field"><div class="tl-field-label">Diagnostic</div><div class="tl-field-value">${h.diagnostic}</div></div>
              <div class="tl-field"><div class="tl-field-label">Traitement</div><div class="tl-field-value">${h.traitement}</div></div>
              ${h.tension_od?`<div class="tl-field"><div class="tl-field-label">Tonus</div><div class="tl-field-value">OD: ${h.tension_od} mmHg | OG: ${h.tension_og} mmHg</div></div>`:''}
              ${h.acuite_od?`<div class="tl-field"><div class="tl-field-label">Acuité</div><div class="tl-field-value">OD: ${h.acuite_od} | OG: ${h.acuite_og}</div></div>`:''}
            </div>
            ${h.notes?`<div class="tl-note">📝 ${h.notes}</div>`:''}
          </div>`;
        }).join('')}
      </div>` : '<div style="color:var(--text3);text-align:center;padding:20px">Aucune consultation post-opératoire enregistrée</div>'}`;
}

function addNote() {
  const input = document.getElementById('noteInput');

  const notes = getNotes();
  notes.unshift({ text, date: new Date().toLocaleDateString('fr-FR', {day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit'}) });
  saveNotes(notes);
  input.value = '';
  document.getElementById('notesList').innerHTML = renderNotesList();

function deleteNote(i) {
  const notes = getNotes();
  notes.splice(i, 1);

  document.getElementById('notesList').innerHTML = renderNotesList();

// ─── API HELPER ───────────────────────────────────────────────────────────────
async function api(url, method='GET', body=null) {
  const opts = { method, headers:{'Content-Type':'application/json'}, credentials:'include' };
  if(body) opts.body = JSON.stringify(body);
  try {
    const r = await fetch(url, opts);
    return await r.json();
  } catch(e) { return {error:e.message}; }
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
function fmtDate(d) { return new Date(d).toLocaleDateString('fr-FR'); }
function fmtDateLong(d) { return new Date(d).toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'}).toUpperCase(); }
function escH(t) { const d=document.createElement('div'); d.textContent=t; return d.innerHTML.replace(/\n/g,'<br>'); }
function escJ(s) { return (s||'').replace(/'/g,"\\'").replace(/"/g,'\\"').replace(/\n/g,' '); }

async function openAssignerMedecin(pid) {
  const medecins = MEDECINS.length ? MEDECINS : await api('/api/medecins');
  const patient = window._currentPatient;
  const currentMedecinId = patient?.medecin_id || '';
  const options = medecins.map(m =>
    `<option value="${m.id}" ${m.id===currentMedecinId?'selected':''}>${m.nom} ${m.prenom} (${m.username})</option>`
  ).join('');
  document.getElementById('modalRdvContent').innerHTML = `
    <div style="margin-bottom:16px">
      <label class="lbl">Assigner à un médecin</label>
      <select class="input" id="assignMedecinSelect">${options}</select>
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn btn-ghost" onclick="closeModal('modalRdv')">Annuler</button>
      <button class="btn btn-primary" onclick="submitAssignerMedecin('${pid}')">Enregistrer</button>
    </div>`;
  document.getElementById('modalRdvTitle').textContent = 'Assigner un médecin';
  openModal('modalRdv');

async function submitAssignerMedecin(pid) {
  const medecin_id = document.getElementById('assignMedecinSelect').value;

// ─── EVOLUTION CHARTS ─────────────────────────────────────────────────────────
const _charts = {};

function parseAV(s) {
  if (!s) return null;
  const m = s.match(/(\d+)\/(\d+)/);
  if (m) return parseFloat(m[1]) / parseFloat(m[2]);
  const n = parseFloat(s);
  return isNaN(n) ? null : n;
}

function parseIOP(s) {
  if (!s) return null;
  const n = parseFloat(s);
  return isNaN(n) ? null : n;
}

function renderEvolutionCharts(patient, pid) {
  const hist = [...patient.historique].reverse(); // chronological order
  const labels = hist.map(h => fmtDate(h.date));
  const chartDefaults = {
    responsive: true,
    maintainAspectRatio: true,
    plugins: { legend: { labels: { color: '#8ba7be', font: { size: 11 } } } },
    scales: {
      x: { ticks: { color: '#8ba7be', font: { size: 10 } }, grid: { color: '#153045' } },
      y: { ticks: { color: '#8ba7be', font: { size: 10 } }, grid: { color: '#153045' } }
    }
  };

  const iopOd = hist.map(h => parseIOP(h.tension_od));
  const iopOg = hist.map(h => parseIOP(h.tension_og));
  if (iopOd.some(v=>v!==null)) {
    if (_charts[`iop-${pid}`]) _charts[`iop-${pid}`].destroy();
    const ctxIop = document.getElementById(`chart-iop-${pid}`);
    if (ctxIop) {
      _charts[`iop-${pid}`] = new Chart(ctxIop, {
        type: 'line',
        data: {
          labels,
          datasets: [
            { label: 'OD', data: iopOd, borderColor: '#0ea5a0', backgroundColor: 'rgba(14,165,160,.1)', tension: .3, pointRadius: 4 },
            { label: 'OG', data: iopOg, borderColor: '#f59e0b', backgroundColor: 'rgba(245,158,11,.1)', tension: .3, pointRadius: 4 }
          ]
        },
        options: chartDefaults
      });
    }
  }

  const avOd = hist.map(h => parseAV(h.acuite_od));
  const avOg = hist.map(h => parseAV(h.acuite_og));
  if (avOd.some(v=>v!==null)) {
    if (_charts[`av-${pid}`]) _charts[`av-${pid}`].destroy();
    const ctxAv = document.getElementById(`chart-av-${pid}`);
    if (ctxAv) {
      _charts[`av-${pid}`] = new Chart(ctxAv, {
        type: 'line',
        data: {
          labels,
          datasets: [
            { label: 'OD', data: avOd, borderColor: '#0ea5a0', backgroundColor: 'rgba(14,165,160,.1)', tension: .3, pointRadius: 4 },
            { label: 'OG', data: avOg, borderColor: '#f59e0b', backgroundColor: 'rgba(245,158,11,.1)', tension: .3, pointRadius: 4 }
          ]
        },
        options: { ...chartDefaults, scales: { ...chartDefaults.scales, y: { ...chartDefaults.scales.y, min: 0, max: 1 } } }
      });
    }
  }
}

function renderOrdonnancesList(ordonnances, pid) {
  if (!ordonnances.length) return '<div style="color:var(--text3);text-align:center;padding:30px">Aucune ordonnance</div>';
  return ordonnances.map(o => {
    let body = '';
    if (o.type === 'lunettes') {
      const c = o.contenu;
      body = `
        <table class="ordo-table">
          <thead><tr><th></th><th>Sphère</th><th>Cylindre</th><th>Axe</th><th>Addition</th></tr></thead>
          <tbody>
            <tr><td>OD</td><td>${c.od_sph||'—'}</td><td>${c.od_cyl||'—'}</td><td>${c.od_axe||'—'}</td><td>${c.od_add||'—'}</td></tr>
            <tr><td>OG</td><td>${c.og_sph||'—'}</td><td>${c.og_cyl||'—'}</td><td>${c.og_axe||'—'}</td><td>${c.og_add||'—'}</td></tr>
          </tbody>
        </table>
        ${c.type_verre ? `<div style="margin-top:8px;font-size:12px;color:var(--text2)">Verres : <strong>${c.type_verre}</strong></div>` : ''}`;
    } else if (o.type === 'medicaments') {
      const meds = o.contenu.medicaments || [];
      body = meds.map(m => `
        <div class="med-item">
          <div style="font-size:18px">💊</div>
          <div><div class="med-name">${m.nom}</div><div class="med-posologie">${m.posologie}${m.duree?` · ${m.duree}`:''}</div></div>
        </div>`).join('');
    } else if (o.type === 'bilan') {
      const exams = o.contenu.examens || [];
      body = `<div style="font-size:13px;color:var(--text2)">${exams.map(e=>`<div style="padding:4px 0;border-bottom:1px solid var(--border)">🔬 ${e}</div>`).join('')}</div>`;
    }
    return `
      <div class="ordo-card">
        <div class="ordo-header">
          <div style="display:flex;align-items:center;gap:10px">
            <span class="ordo-type-badge">${o.type}</span>
            <span class="ordo-meta">${fmtDate(o.date)} · ${o.medecin}</span>
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-ghost btn-sm" onclick="printOrdonnance('${o.id}','${pid}')">🖨 Imprimer</button>
            <button class="btn btn-ghost btn-sm" style="opacity:.6" onclick="deleteOrdonnance('${pid}','${o.id}')">🗑</button>
          </div>
        </div>
        ${body}
        ${o.notes ? `<div style="margin-top:10px;font-size:12px;color:var(--text3)">📝 ${o.notes}</div>` : ''}
      </div>`;
  }).join('');
}

      <option value="unifocaux">Unifocaux</option>
      <option value="progressifs">Progressifs</option>
      <option value="bifocaux">Bifocaux</option>
    </select></div>`;
}

function buildOrdoBilanForm() {
  return `
    <div id="bilanRows">
      <input class="input bilan-exam" placeholder="Ex: OCT macula OD+OG" style="margin-bottom:8px">
    </div>
    <button class="btn btn-ghost btn-sm" onclick="addBilanRow()">+ Ajouter un examen</button>`;
}

function updateOrdoForm() {
  const t = document.getElementById('oType').value;
  const body = t==='lunettes' ? buildOrdoLunettesForm() : t==='bilan' ? buildOrdoBilanForm() : buildOrdoMedsForm();
  document.getElementById('ordoFormBody').innerHTML = body;
}

function addMedRow() {
  const row = document.createElement('div');
  row.className = 'med-row';
  row.style.cssText = 'display:grid;grid-template-columns:2fr 2fr 1fr;gap:8px;margin-bottom:8px';
  row.innerHTML = `<input class="input med-nom" placeholder="Médicament"><input class="input med-posologie" placeholder="Posologie"><input class="input med-duree" placeholder="Durée">`;
  document.getElementById('medRows').appendChild(row);
}

function addBilanRow() {
  const inp = document.createElement('input');
  inp.className = 'input bilan-exam';
  inp.placeholder = 'Examen complémentaire';
  inp.style.marginBottom = '8px';
  document.getElementById('bilanRows').appendChild(inp);
}

async function submitOrdonnance(pid) {
  const type = document.getElementById('oType').value;
  const notes = document.getElementById('oNotes').value.trim();
  let contenu = {};
  if (type === 'medicaments') {
    contenu.medicaments = [...document.querySelectorAll('.med-row')].map(r => ({
      nom:       r.querySelector('.med-nom').value.trim(),
      posologie: r.querySelector('.med-posologie').value.trim(),
      duree:     r.querySelector('.med-duree').value.trim(),
    })).filter(m => m.nom);
  } else if (type === 'lunettes') {
    contenu = {
      od_sph: document.getElementById('lOdSph').value.trim(),
      od_cyl: document.getElementById('lOdCyl').value.trim(),
      od_axe: document.getElementById('lOdAxe').value.trim(),
      od_add: document.getElementById('lOdAdd').value.trim(),
      og_sph: document.getElementById('lOgSph').value.trim(),
      og_cyl: document.getElementById('lOgCyl').value.trim(),
      og_axe: document.getElementById('lOgAxe').value.trim(),
      og_add: document.getElementById('lOgAdd').value.trim(),
      type_verre: document.getElementById('lTypeVerre').value,
    };
  } else if (type === 'bilan') {
    contenu.examens = [...document.querySelectorAll('.bilan-exam')].map(i=>i.value.trim()).filter(Boolean);
  }
  const res = await api(`/api/patients/${pid}/ordonnances`, 'POST', { type, contenu, notes });
  if (res.ok) {
    closeModal('modalOrdonnance');
    loadPatient(pid);
  } else {
    alert(res.error || 'Erreur');
  }
}

async function deleteOrdonnance(pid, oid) {
  if (!confirm('Supprimer cette ordonnance ?')) return;
  await api(`/api/patients/${pid}/ordonnances/${oid}`, 'DELETE');
  loadPatient(pid);
}

async function printOrdonnance(oid, pid) {
  const patient = window._currentPatient;
  const ordo = patient.ordonnances.find(o => o.id === oid);
  if (!ordo) return;
  let body = '';
  if (ordo.type === 'lunettes') {
    const c = ordo.contenu;
    body = `<table border="1" cellpadding="8" style="width:100%;border-collapse:collapse;margin:16px 0">
      <tr><th></th><th>Sphère</th><th>Cylindre</th><th>Axe</th><th>Addition</th></tr>
      <tr><td><b>OD</b></td><td>${c.od_sph||''}</td><td>${c.od_cyl||''}</td><td>${c.od_axe||''}</td><td>${c.od_add||''}</td></tr>
      <tr><td><b>OG</b></td><td>${c.og_sph||''}</td><td>${c.og_cyl||''}</td><td>${c.og_axe||''}</td><td>${c.og_add||''}</td></tr>
    </table>
    ${c.type_verre ? `<p>Verres : <b>${c.type_verre}</b></p>` : ''}`;
  } else if (ordo.type === 'medicaments') {
    body = (ordo.contenu.medicaments||[]).map(m=>`<p><b>${m.nom}</b> — ${m.posologie}${m.duree?` (${m.duree})`:''}</p>`).join('');
  } else if (ordo.type === 'bilan') {
    body = (ordo.contenu.examens||[]).map(e=>`<p>• ${e}</p>`).join('');
  }
  const age = new Date().getFullYear() - new Date(patient.ddn).getFullYear();
  const w = window.open('', '_blank', 'width=700,height=900');
  w.document.write(`<!DOCTYPE html><html><head><title>Ordonnance</title>
  <style>body{font-family:serif;padding:40px;color:#000}h1{font-size:18px}h2{font-size:15px}p{margin:6px 0}table{width:100%}th,td{border:1px solid #000;padding:6px;text-align:center}hr{margin:20px 0}.footer{margin-top:40px;font-size:12px;color:#666}</style>
  </head><body>
  <h1>${ordo.medecin}</h1><hr>
  <p><b>Patient :</b> ${patient.prenom} ${patient.nom} — ${age} ans — ${patient.sexe==='F'?'F':'M'}</p>
  <p><b>Date :</b> ${fmtDate(ordo.date)}</p><hr>
  ${body}
  ${ordo.notes ? `<p><i>${ordo.notes}</i></p>` : ''}
  <div class="footer">Signature du médecin :</div>
  </body></html>`);
  w.document.close();
  w.print();
}
</script>
</body>
</html>
