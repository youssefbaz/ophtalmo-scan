###############################################################################
# OphtalmoScan — nginx reverse-proxy configuration
#
# Place in /etc/nginx/sites-available/ophtalmo and symlink to sites-enabled/.
# Replace YOUR_DOMAIN with your actual domain (e.g. ophtalmo.clinique.ma).
# SSL certificates are managed by certbot (Let's Encrypt).
#
# Run after setup:
#   sudo nginx -t && sudo systemctl reload nginx
###############################################################################

upstream ophtalmo_app {
    server 127.0.0.1:8000;
    keepalive 32;
}

# Redirect all plain HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN;

    # ── TLS (managed by certbot) ──────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Security headers (Talisman handles these in Flask too — belt+braces) ─
    add_header X-Frame-Options           DENY            always;
    add_header X-Content-Type-Options    nosniff         always;
    add_header Referrer-Policy           strict-origin   always;

    # ── Static files served directly by nginx (no Python round-trip) ─────────
    location /static/ {
        alias /opt/ophtalmo/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Encrypted document uploads directory — never served by nginx ─────────
    location /uploads/ {
        deny all;
        return 404;
    }

    # ── Limit upload body size (images) ──────────────────────────────────────
    client_max_body_size 10M;

    # ── Proxy to gunicorn ────────────────────────────────────────────────────
    location / {
        proxy_pass         http://ophtalmo_app;
        proxy_http_version 1.1;
        proxy_set_header   Connection      "";
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
